name: .NET MAUI Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI workloads
        run: dotnet workload install maui

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Android APK
        run: |
          $ks = "${{ github.workspace }}\keystore.jks"
          dotnet publish -f:net10.0-android -c:Release `
            -p:AndroidKeyStore=true `
            -p:AndroidSigningKeyAlias=QiQikey `
            -p:AndroidSigningKeyPass=123456 `
            -p:AndroidSigningStorePass=123456 `
            "-p:AndroidSigningStoreKey=$ks" `
            -p:AndroidPackageFormat=apk `
            -p:JavaMaximumHeapSize=4G `
            -p:AndroidEnableMultiDex=true `
            -p:AndroidDexTool=d8 `
            -p:AndroidEnableR8=false

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: |
            **/bin/Release/net10.0-android/*-Signed.apk
            **/bin/Release/net10.0-android/*-Signed.aab